<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zain Fateh | Engineering Portfolio</title>

  <style>
    :root {
      --bg: #0b1220;
      --surface: #0f172a;
      --card: #0c162b;
      --line: #22304b;
      --text: #e6edf6;
      --muted: #a7b1c5;
      --accent: #60a5fa;
      --radius: 14px;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    header {
      position: sticky;
      top: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--line);
    }

    .nav {
      max-width: 1100px;
      margin: auto;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav a {
      color: var(--text);
      text-decoration: none;
      margin-left: 1rem;
      font-weight: 600;
    }

    section {
      padding: 4rem 1rem;
    }

    .container {
      max-width: 1100px;
      margin: auto;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    h2 {
      font-size: 2rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--line);
      padding-bottom: 0.5rem;
    }

      display: grid;
      grid-template-columns: 1fr 1fr;
